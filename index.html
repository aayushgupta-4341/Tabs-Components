<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabs Component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button id="themeBtn">🌙</button>
<div class="container">
    <h1>📑 Tabs Component</h1>
    <div class="tabs">
        <button class="tab active" data-tab="1">Home</button>
        <button class="tab" data-tab="2">About</button>
        <button class="tab" data-tab="3">Contact</button>
    </div>
    <div class="content active" id="tab-1">
        <p>Welcome! This is the home section.</p>
    </div>
    <div class="content" id="tab-2">
        <p>This is the about section.</p>
    </div>
    <div class="content" id="tab-3">
        <p>Contact us at example@email.com</p>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
